on: [push, pull_request, workflow_dispatch]

name: Build

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Cache west modules
        uses: actions/cache@v2
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      # 왼쪽(Master) 펌웨어 빌드: split_keyboard_left.overlay 사용
      - name: Build Left
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=split_keyboard_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Left
        run: cp build/zephyr/zmk.uf2 split_keyboard_left.uf2

      # 오른쪽(Slave) 펌웨어 빌드: split_keyboard_right.overlay 사용
      - name: Build Right
        run: rm -rf build && west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=split_keyboard_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Right
        run: cp build/zephyr/zmk.uf2 split_keyboard_right.uf2

      - name: Archive Firmwares
        uses: actions/upload-artifact@v2
        with:
          name: firmware
          path: "*.uf2"